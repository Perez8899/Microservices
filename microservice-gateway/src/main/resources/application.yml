server:
  port:8080

spring:
  config:
    import: 'optional:configserver:http://localhost:8888'
  application:
    name: msvc-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enable: true

      routers:
        - id: students
          uri: http://localhost:8090
          predicates:
            - Path=/api/student/** #can access any file--------------------------------------------
        - id: courses
          uri: http://localhost:9090
          predicates:
            - Path=/api/course/**